name: shady

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: shady_postgres
    ports:
      - "${POSTGRES_HOST_PORT:-5436}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - shady_postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shady_network

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: shady_backend
    working_dir: /app
    entrypoint: ["/app/dev-entrypoint.sh"]
    command: ["bun", "run", "dev"]
    ports:
      - "${BACKEND_PORT:-5006}:${BACKEND_PORT:-5006}"
    env_file:
      - .env.dev
      - .env.dev.generated
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - PORT=${BACKEND_PORT}
      - LOGTO_BACKEND_ENDPOINT=http://host.docker.internal:3001
      - LOGTO_JWKS_URL=http://host.docker.internal:3001/oidc/jwks
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./google.json:/app/google.json:ro
      - shady_uploads_data:/data/uploads
    networks:
      - shady_network
    restart: unless-stopped

  admin:
    build:
      context: ..
      dockerfile: ./shady/admin/Dockerfile.dev
    container_name: shady_admin
    working_dir: /workspace/shady/admin
    entrypoint: ["/workspace/shady/admin/dev-entrypoint.sh"]
    command: ["bun", "run", "dev", "--host", "0.0.0.0", "--port", "5175"]
    ports:
      - "${ADMIN_PORT:-5175}:5175"
    env_file:
      - .env.dev.generated
    volumes:
      - ./admin:/workspace/shady/admin
      # Mount shared packages at paths the vite alias candidates resolve
      # (bypasses node_modules symlinks which break in Docker)
      - ../blueprint/src:/workspace/shady/admin/blueprint/src:ro
      - ../backend/model-catalog:/workspace/shady/admin/backend/model-catalog:ro
      - ../backend/entity-schema:/workspace/shady/admin/backend/entity-schema:ro
      - ../backend/flow-schema:/workspace/shady/admin/backend/flow-schema:ro
    networks:
      - shady_network
    restart: unless-stopped

  widget-dev:
    build:
      context: ./widget
      dockerfile: Dockerfile.dev
    container_name: shady_widget
    entrypoint: ["/app/dev-entrypoint.sh"]
    command: ["bun", "run", "dev", "--host", "0.0.0.0", "--port", "5174"]
    ports:
      - "5174:5174"
    env_file:
      - .env.dev.generated
    volumes:
      - ./widget:/app
    networks:
      - shady_network
    restart: unless-stopped

  widget-embed:
    build:
      context: ./widget
      dockerfile: Dockerfile
    container_name: shady_widget_embed
    ports:
      - "${WIDGET_PORT:-5178}:${WIDGET_PORT:-3001}"
    env_file:
      - .env.dev
      - .env.dev.generated
    networks:
      - shady_network
    restart: unless-stopped

  drizzle-studio:
    image: node:20-alpine
    container_name: shady_drizzle_studio
    working_dir: /workspace
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      NODE_ENV: development
      STUDIO_PORT: 4985
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - drizzle_studio_workspace:/workspace
      - ./backend:/app/backend:ro
      - ./.env.dev:/workspace/.env.dev:ro
      - ./.env.dev.generated:/workspace/.env.dev.generated:ro
      - ./scripts/drizzle-studio-entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "4985:4985"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shady_network
    restart: "no"

volumes:
  shady_postgres_data:
  shady_uploads_data:
  drizzle_studio_workspace:

networks:
  shady_network:
    driver: bridge
