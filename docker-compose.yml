name: shady

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: shady_postgres
    ports:
      - "5436:5432"
    environment:
      POSTGRES_DB: booking_service
      POSTGRES_USER: booking_user
      POSTGRES_PASSWORD: booking_password
    volumes:
      - shady_postgres_data:/var/lib/postgresql/data
      - ./backend/src/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U booking_user -d booking_service"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shady_network

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: shady_backend
    ports:
      - "5006:5006"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://booking_user:booking_password@postgres:5432/booking_service
      - PORT=5006
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src:ro
      - ./google.json:/app/google.json:ro
    networks:
      - shady_network
    restart: unless-stopped

  admin:
    build:
      context: ..
      dockerfile: ./shady/admin/Dockerfile.dev
    container_name: shady_admin
    command: ["bun", "run", "dev", "--host", "0.0.0.0", "--port", "5175"]
    ports:
      - "5175:5175"
    environment:
      - VITE_BACKEND_URL=http://localhost:5006
      - VITE_WIDGET_URL=http://localhost:5178
    volumes:
      - ./admin:/app
      - /app/node_modules
      - ../blueprint/src:/app/blueprint/src:ro
      - ../backend/model-catalog:/app/backend/model-catalog:ro
      - ../backend/entity-schema:/app/backend/entity-schema:ro
      - ../backend/flow-schema:/app/backend/flow-schema:ro
      - ./.env:/app/.env.development:ro
    networks:
      - shady_network
    restart: unless-stopped

  widget-dev:
    build:
      context: ./widget
      dockerfile: Dockerfile.dev
    container_name: shady_widget
    command: ["bun", "run", "dev", "--host", "0.0.0.0", "--port", "5174"]
    ports:
      - "5174:5174"
    environment:
      - VITE_BACKEND_URL=http://localhost:5006
      - VITE_WIDGET_URL=http://localhost:5178
      - VITE_WIDGET_DEFAULT_ORG=aico-global
    volumes:
      - ./widget:/app
      - /app/node_modules
      - ./.env:/app/.env.development:ro
    networks:
      - shady_network
    restart: unless-stopped

  widget-embed:
    build:
      context: ./widget
      dockerfile: Dockerfile
    container_name: shady_widget_embed
    ports:
      - "5178:3001"
    environment:
      - WIDGET_PORT=3001
      - VITE_BACKEND_URL=http://localhost:5006
      - VITE_WIDGET_URL=http://localhost:5178
      - VITE_WIDGET_DEFAULT_ORG=aico-global
    networks:
      - shady_network
    restart: unless-stopped

  drizzle-studio:
    image: node:20-alpine
    container_name: shady_drizzle_studio
    working_dir: /workspace
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    environment:
      NODE_ENV: development
      STUDIO_PORT: 4985
      DATABASE_URL: postgresql://booking_user:booking_password@postgres:5432/booking_service
    volumes:
      - drizzle_studio_workspace:/workspace
      - ./backend:/app/backend:ro
      - ./.env:/workspace/.env:ro
      - ./scripts/drizzle-studio-entrypoint.sh:/entrypoint.sh:ro
    ports:
      - "4985:4985"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shady_network
    restart: "no"

volumes:
  shady_postgres_data:
  drizzle_studio_workspace:

networks:
  shady_network:
    driver: bridge
