name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "backend"
      - "admin/**"
      - "admin"
      - "widget/**"
      - "widget"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Umbrella repo tracks the correct commit for each shared dependency via submodules.
  # We read the submodule pointers at runtime instead of hardcoding hashes.
  UMBRELLA_REPO: Aico-Systems/Umbrella

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "image_tag=main" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "image_tag=main" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: ./backend/Dockerfile
            paths: "backend/**"
          - service: admin
            context: .
            dockerfile: ./admin/Dockerfile
            paths: "admin/**"
          - service: widget
            context: ./widget
            dockerfile: ./widget/Dockerfile
            paths: "widget/**"

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if service changed
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          SERVICE_DIR="${{ matrix.paths }}"
          SERVICE_DIR="${SERVICE_DIR%%/**}"

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            else
              echo "changed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi

          # Check for exact match (submodule pointer change) or files within the directory
          if echo "$CHANGED_FILES" | grep -qE "^${SERVICE_DIR}(/|$)"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout shared packages from umbrella submodule pointers
        if: steps.changed.outputs.changed == 'true' && matrix.service == 'admin'
        run: |
          PAT="${{ secrets.SUBMODULES_PAT }}"

          # Read submodule commit SHAs from the umbrella repo (single source of truth)
          # --bare: no checkout needed, ls-tree reads from the object store directly
          git clone --depth 1 --bare --filter=blob:none \
            "https://x-access-token:${PAT}@github.com/${{ env.UMBRELLA_REPO }}.git" /tmp/umbrella
          BLUEPRINT_SHA=$(git -C /tmp/umbrella ls-tree HEAD blueprint | awk '{print $3}')
          BACKEND_SHA=$(git -C /tmp/umbrella ls-tree HEAD backend | awk '{print $3}')
          echo "Blueprint: $BLUEPRINT_SHA, Backend: $BACKEND_SHA"
          rm -rf /tmp/umbrella

          # Checkout blueprint at the umbrella-pinned commit
          git clone --depth 1 --filter=blob:none \
            "https://x-access-token:${PAT}@github.com/Aico-Systems/blueprint.git" \
            -b "$BLUEPRINT_SHA" blueprint 2>/dev/null || \
          (git clone --filter=blob:none \
            "https://x-access-token:${PAT}@github.com/Aico-Systems/blueprint.git" blueprint && \
           cd blueprint && git checkout "$BLUEPRINT_SHA")

          # Sparse-checkout backend packages at the umbrella-pinned commit
          git clone --filter=blob:none --sparse \
            "https://x-access-token:${PAT}@github.com/Aico-Systems/backend.git" /tmp/aico-backend
          cd /tmp/aico-backend && git checkout "$BACKEND_SHA"
          git sparse-checkout set entity-schema model-catalog
          mkdir -p "$GITHUB_WORKSPACE/backend"
          cp -r entity-schema "$GITHUB_WORKSPACE/backend/entity-schema"
          cp -r model-catalog "$GITHUB_WORKSPACE/backend/model-catalog"
          rm -rf /tmp/aico-backend

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.changed.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        if: steps.changed.outputs.changed == 'true'
        id: repo
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        if: steps.changed.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.owner_lc }}/shady-${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=sha,prefix=sha-

      - name: Build and push
        if: steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'failure'
    steps:
      - name: Trigger deploy webhook
        run: |
          TAG="${{ needs.prepare.outputs.image_tag }}"
          URL="https://deploy.shady.aicoflow.com"

          echo "Triggering deploy at $URL (tag=$TAG, sha=${{ github.sha }})"

          HTTP_CODE=$(curl -sS -o /tmp/webhook-response.json -w "%{http_code}" \
            -X POST "$URL/" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"image_tag\": \"$TAG\", \"sha\": \"${{ github.sha }}\"}" \
            --connect-timeout 10 --max-time 30)

          BODY=$(cat /tmp/webhook-response.json 2>/dev/null || echo "{}")
          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deploy triggered successfully"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "::warning::Deploy already in progress on server"
          else
            echo "::error::Deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi
