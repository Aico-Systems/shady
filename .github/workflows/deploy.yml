name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "backend"
      - "admin/**"
      - "admin"
      - "widget/**"
      - "widget"
      - "deploy/**"
      - "infra/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      image_tag: ${{ steps.set-env.outputs.image_tag }}
    steps:
      - name: Set environment
        id: set-env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "image_tag=main" >> $GITHUB_OUTPUT
          else
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "image_tag=main" >> $GITHUB_OUTPUT
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: ./backend/Dockerfile
            paths: "backend/**"
          - service: admin
            context: .
            dockerfile: ./admin/Dockerfile
            paths: "admin/**"
          - service: widget
            context: ./widget
            dockerfile: ./widget/Dockerfile
            paths: "widget/**"

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if service changed
        id: changed
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          SERVICE_DIR="${{ matrix.paths }}"
          SERVICE_DIR="${SERVICE_DIR%%/**}"

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$BEFORE" 2>/dev/null; then
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            else
              echo "changed=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "${{ github.sha }}")
          fi

          # Check for exact match (submodule pointer change) or files within the directory
          if echo "$CHANGED_FILES" | grep -qE "^${SERVICE_DIR}(/|$)"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout blueprint
        if: steps.changed.outputs.changed == 'true' && matrix.service == 'admin'
        uses: actions/checkout@v4
        with:
          repository: Aico-Systems/blueprint
          token: ${{ secrets.SUBMODULES_PAT }}
          path: blueprint

      - name: Checkout backend schema packages
        if: steps.changed.outputs.changed == 'true' && matrix.service == 'admin'
        uses: actions/checkout@v4
        with:
          repository: Aico-Systems/backend
          token: ${{ secrets.SUBMODULES_PAT }}
          sparse-checkout: |
            entity-schema
            model-catalog
          path: .backend-tmp

      - name: Move backend packages into build context
        if: steps.changed.outputs.changed == 'true' && matrix.service == 'admin'
        run: |
          mkdir -p backend
          mv .backend-tmp/entity-schema backend/entity-schema
          mv .backend-tmp/model-catalog backend/model-catalog
          rm -rf .backend-tmp

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: steps.changed.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        if: steps.changed.outputs.changed == 'true'
        id: repo
        run: echo "owner_lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract metadata
        if: steps.changed.outputs.changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.repo.outputs.owner_lc }}/shady-${{ matrix.service }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.image_tag }}
            type=sha,prefix=sha-

      - name: Build and push
        if: steps.changed.outputs.changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'failure'
    steps:
      - name: Trigger deploy webhook
        run: |
          TAG="${{ needs.prepare.outputs.image_tag }}"
          URL="https://deploy.shady.aicoflow.com"

          echo "Triggering deploy at $URL (tag=$TAG, sha=${{ github.sha }})"

          HTTP_CODE=$(curl -sS -o /tmp/webhook-response.json -w "%{http_code}" \
            -X POST "$URL/" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"image_tag\": \"$TAG\", \"sha\": \"${{ github.sha }}\"}" \
            --connect-timeout 10 --max-time 30)

          BODY=$(cat /tmp/webhook-response.json 2>/dev/null || echo "{}")
          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Deploy triggered successfully"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "::warning::Deploy already in progress on server"
          else
            echo "::error::Deploy webhook failed with HTTP $HTTP_CODE"
            exit 1
          fi
